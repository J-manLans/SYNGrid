# NOTE: Do not modify this config file.
# These are the default settings used for tests.
# Any changes needed for a specific test should be made
# directly in the test files, not here.

###########################
#   Experiment Settings   #
###########################

snapshot:
  # Snapshot settings:
  # - enabled: whether to save a snapshot of the full config
  # - id: optional identifier used as part of the snapshot filename
  enabled: false
  id: ""

###########################
#   World Configuration   #
###########################

world:
  grid_world_conf:
    # - number of rows and columns
    # - single_chain_mode: if true only one of each orb will be created and spawned at once, if collected in order episode terminates with a reward, else just truncation
    # - max_tier: this is the highest tier that orbs can reach in this environment
    # - max active orbs: number of max active orbs on grid
    # - de_spawn_tiers: decides if tiers should de-spawn just as the non tier orbs
    grid_rows: &grid_rows 5
    grid_cols: &grid_cols 5
    single_chain_mode: &single_chain_mode false
    max_tier: &max_tier 3
    max_active_orbs: &max_active_orbs 3
    de_spawn_tiers: &de_spawn_tiers true

  renderer_conf:
    # - grid_rows / grid_cols (set in grid_world_conf): used to calculate display size and layout
    # - img_assets: paths to graphic elements
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    img_assets:
      droid_img: "assets/sprites/droid.png"
      positive_orb_img: "assets/sprites/positive_orb.png"
      negative_orb_img: "assets/sprites/negative_orb.png"
      floor_img: "assets/tiles/floor.png"
      hud_img: "assets/sprites/hud.png"

  droid_conf:
    # - grid_rows / grid_cols (set in grid_world_conf): defines the grid the droid can move in
    # - starting_score: initial score of the droid
    # - step_penalty: the cost of moving around for the agent
    # - tier_consumption_penalty: (only applicable if step_wise_scoring is true)punishment for consuming tier orbs in the wrong order
    # - reward_multiplier: multiplier applied to rewards when threshold scoring in tier_orb_conf is activated
    # - termination_on_max_tier: terminate the episode as max tier is reached
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    starting_score: 30
    step_penalty: &step_penalty -1.0
    tier_consumption_penalty: *step_penalty
    reward_multiplier: 0.5
    termination_on_max_tier: &termination_on_max_tier false

  orb_factory_conf:
    # - grid_rows / grid_cols (set in grid_world_conf): used to set orbs life span
    # - max_active_orbs (set in grid_world_conf): max active orbs on grid
    # - max_tier: this is the highest tier that orbs can reach in this environment
    # - termination_on_max_tier (set in droid_conf): don't change this, it determine if single chain mode is possible
    # - max_tier_scoring (also used in tier_orb_conf, must be active in single_chain_mode): if true, reward is only given if max tier is reached
    # - single_chain_mode (set in grid_world_conf): if true only one of each orb will be created and spawned at once, if collected in order episode terminates with a reward, else just termination
    # - each orb type can be enabled/disabled
    # - weight defines relative spawn frequency when multiple orbs are active
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    max_active_orbs: *max_active_orbs
    max_tier: *max_tier
    termination_on_max_tier: *termination_on_max_tier
    max_tier_scoring: &max_tier_scoring false
    single_chain_mode: *single_chain_mode
    types:
      negative:
        enabled: &neg_enabled true
        weight: 1
      tier:
        enabled: &tier_enabled true
        weight: 2

  negative_orb_conf:
    # - reward: penalty applied when interacting with the orb
    # - cool_down: number of steps before the orb can be reused
    reward: -3.0
    cool_down: 10

  tier_orb_conf:
    # - linear_reward_growth: if true, reward scales linearly instead of exponentially
    # - step_wise_scoring: if true, reward is given per correctly consumed tier instead of on chain break
    # - threshold_scoring: if true, partial reward is given if the chain breaks or an accumulated reward if max tier is reached
    # - max_tier_scoring (set in orb_factory_conf): if true, reward is only given if max tier is reached
    # - growth_factor: multiplier applied per tier increase if linear_reward_growth is false
    # - base_reward: starting reward value at tier 0
    # - cool_down: number of steps before the orb can be reused
    linear_reward_growth: true
    step_wise_scoring: true
    threshold_scoring: false
    max_tier_scoring: *max_tier_scoring
    growth_factor: 1.5
    base_reward: 3
    cool_down: 7

###########################
#    Obs Configuration    #
###########################

obs:
  observation_handler:
    # - perception: decides how much information to pack into the agents observation. Check out the ObservationHandlerConf in models.py for options
    # - max_steps: number of steps in an episode until truncated
    perception: "vector_fully_pomdp"
    max_steps: &max_steps 100

  perception:
    # - max_score: set per scenario based on expected achievable score in this setup
    # - max_steps (set in observation_handler): number of steps in an episode until truncated
    # - max_tier (set in orb_factory_conf): max tier of the tier type orbs
    # - grid_rows / grid_cols (set in grid_world_conf): fix the maximum observation space size for those variables
    # - max_active_orbs (set in grid_world_conf): max active orbs on grid
    # - include_timer(set in grid_world_conf): used to decide if orb timer should be added to the observation
    # - enabled_orbs (set in orb_factory_conf): defines which orb types are active, used to build the observation space
    max_score: &max_score 100
    max_steps: *max_steps
    max_tier: *max_tier
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    max_active_orbs: *max_active_orbs
    include_timer: *de_spawn_tiers
    enabled_orbs:
      neg_enabled: *neg_enabled
      tier_enabled: *tier_enabled

###########################
#   Agent Configuration   #
###########################

agent:
  global_agent_conf:
    # Global settings:
    # - algorithm: which algorithm the agent will use
    # - agent_steps: identifier for the model to continue training or evaluate
    # - id_tag: (null if not applicable) used to tag your model so it can be easily found
    # - save_folder: (null for default) specify this if you want to have special folders for your experiments
    # - seed: algorithm seed for initial weights and env reproducibility
    # - human_control: allow human to control the game manually, disables training and eval
    # - training: set to false to evaluate the agent
    # - check_env: set to true if you wanna control your changes in the environment didn't break anything obvious
    alg: "PPO"
    agent_steps: "1605632"
    id_tag: 'combo_reward'
    save_folder: 'ppo'
    seed: 3
    human_control: true
    training: true
    check_env: false

  # Pick algorithm to train or evaluate
  train_agent_conf:
    # Train settings:
    # - continue_training: continue from a previously saved model
    # - monitor_output: False if you are debugging or experimenting and only want to inspect behavior, not persist results
    # - enable_output: False if you are debugging or experimenting and only want to inspect behavior, not persist results
    # - tensor_output: False if you are debugging or experimenting and only want to inspect behavior, not persist training
    # - model_output (null or "human"): null is default, change to human if you want visual feedback for debugging
    # - timesteps: number of timesteps per iteration (a checkpoint is saved after this many steps)
    # - iterations: total number of training iterations
    continue_training: false
    monitor_output: true
    tensorboard_output: true
    model_output: true
    render_mode: null
    timesteps: 400000
    iterations: 4

  eval_agent_conf:
    # Eval settings:
    # - num_eval_episodes: how many episodes to evaluate
    # - render_mode (null or "human"): null is default, change to null if you don't want visual feedback during debugging
    num_eval_episodes: 1
    render_mode: null